worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Override/Add MIME types for JS/TS to avoid conflicts with video/mp2t
    types {
        # 'js' is already in mime.types, so we only add/override others here
        text/javascript ts;
        application/javascript mjs;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Increase buffer size for sub_filter and proxy operations
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    server {
        listen 80;
        server_name _;

        # Git HTTP backend for push/pull
        location ~ ^/git(/.*) {
            client_max_body_size 0;

            fastcgi_param SCRIPT_FILENAME /usr/libexec/git-core/git-http-backend;
            fastcgi_param GIT_HTTP_EXPORT_ALL "";
            fastcgi_param GIT_PROJECT_ROOT /app/repos;
            fastcgi_param PATH_INFO $1;
            fastcgi_param REMOTE_USER $remote_user;

            fastcgi_pass unix:/var/run/fcgiwrap.sock;
            include fastcgi_params;
        }

        # Load dynamic configurations for different branches/apps
        include /app/nginx/conf.d/*.conf;

        # Default route - API status check
        location / {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
        }
    }
}